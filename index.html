<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAEEB - SEMANA DO CALOURO 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-arcade: radial-gradient(circle, #2c1a4d 0%, #110a1f 100%);
            --gabinete-borda: #ffd700;
            --gabinete-fundo: #ff4500;
            --text-pixel: #fff;
            --text-highlight: #ff0;
            --error-pixel: #ff4444;
            --success-pixel: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            /* Força renderização pixelada para imagens e fontes */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }

        body {
            background: var(--bg-arcade);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-pixel);
            overflow: hidden; 
            padding: 20px;
        }

        /* Área do Logo PNG da pasta assets */
        #logo-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            text-align: center;
        }

        #logo-img {
            max-width: 100%;
            height: auto;
            /* Efeito de brilho na logo */
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); 
        }

        /* A DIV MAIN - Gabinete/Botão Start */
        .arcade-card {
            background-color: var(--gabinete-fundo);
            border: 8px solid var(--gabinete-borda);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5), inset 4px 4px 0px rgba(255,255,255,0.3);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .arcade-card h2 {
            font-size: 16px;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
        }

        .arcade-card label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: left;
            color: rgba(255,255,255,0.9);
            text-shadow: 1px 1px 0px #000;
        }

        /* Inputs Pixelados */
        .arcade-input {
            width: 100%;
            background: #000;
            border: 4px solid #fff;
            color: var(--text-highlight);
            padding: 15px;
            font-size: 12px;
            margin-bottom: 20px;
            outline: none;
            box-shadow: inset 4px 4px 0px rgba(255,255,255,0.2);
        }

        .arcade-input:focus {
            border-color: var(--text-highlight);
        }

        /* Botão de Validar - Estilo Retro com Animação */
        .arcade-btn {
            width: 100%;
            background-color: #0000ff; 
            border: 4px solid #fff;
            color: #fff;
            padding: 15px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.2s;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.4);
            animation: piscar 2s infinite; /* Efeito Insert Coin */
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; background-color: #1e90ff; }
        }

        .arcade-btn:hover {
            background-color: #1e90ff;
            animation: none; /* Para de piscar ao passar o mouse */
        }

        .arcade-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.4);
        }

        .arcade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        /* Área de Feedback (Sucesso/Erro) */
        #feedback-area {
            margin-top: 25px;
            padding: 15px;
            border: 4px solid transparent;
            font-size: 10px;
            line-height: 1.6;
            display: none;
            text-shadow: 1px 1px 0px #000;
        }

        .feedback-error {
            background-color: #400;
            border-color: var(--error-pixel);
            color: var(--error-pixel);
            display: block !important;
            animation: tremer 0.3s;
        }

        @keyframes tremer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .feedback-success {
            background-color: #040;
            border-color: var(--success-pixel);
            color: var(--success-pixel);
            display: block !important;
        }

        /* O Foguinho GIF - Canto inferior direito */
        #fire-gif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px; 
            height: auto;
            z-index: 100;
            pointer-events: none; 
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="logo-container">
        <img src="./assets/logo-c3.png" id="logo-img" alt="CAEEB 2026">
    </div>

    <div class="arcade-card">
        <h2 id="dia-titulo">DESAFIO DIA 1</h2>
        
        <label>E-mail Institucional</label>
        <input type="email" id="email" class="arcade-input" placeholder="aluno@ufpa.br">

        <div id="password-container" class="hidden">
            <label>Senhas Anteriores</label>
            <input type="text" id="senhas" class="arcade-input" placeholder="Digite sem espaços">
        </div>

        <button onclick="handleSubmit()" id="btn-submit" class="arcade-btn">
            [ VALIDAR ]
        </button>

        <div id="feedback-area"></div>
    </div>

    <img src="./assets/foguinho.gif" id="fire-gif" alt="Fogo">

    <script>
        // COLOQUE AQUI A URL DO SEU GOOGLE APPS SCRIPT
        const API_URL = "SUA_URL_DO_WEB_APP_AQUI"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        const d = urlParams.get('d') || 1;

        // Ajusta a interface dependendo do dia
        document.getElementById('dia-titulo').innerText = `DESAFIO DIA ${d}`;
        if (d >= 3) document.getElementById('password-container').classList.remove('hidden');

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const senhas = document.getElementById('senhas').value.trim();
            const btn = document.getElementById('btn-submit');
            const feedback = document.getElementById('feedback-area');

            if (!email || !q) {
                showFeedback("ERRO: E-MAIL OU QR CODE AUSENTE!", "feedback-error");
                return;
            }

            // Estado de carregamento
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            feedback.className = ""; 
            feedback.innerHTML = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ email, hash: q, senhas, diaAtual: d })
                });
                
                // Melhoria de segurança no front-end: garantindo que o retorno é um JSON válido
                const textResult = await response.text();
                let result;
                try {
                    result = JSON.parse(textResult);
                } catch (parseError) {
                    throw new Error("Erro de CORS ou Script redirecionou a requisição.");
                }

                if (result.type === "DANGER") {
                    showFeedback(result.message, "feedback-error");
                    btn.remove(); // Game Over = Remove o botão
                } else if (result.success) {
                    showFeedback(result.message, "feedback-success");
                    btn.innerText = "SUCESSO!";
                    btn.style.backgroundColor = "var(--success-pixel)";
                    btn.style.animation = "none"; // Para de piscar
                } else {
                    showFeedback(result.message, "feedback-error");
                    btn.innerText = "[ TENTAR NOVAMENTE ]";
                    btn.disabled = false;
                }
            } catch (err) {
                showFeedback("ERRO DE COMUNICACAO COM O SERVIDOR!", "feedback-error");
                btn.disabled = false;
                btn.innerText = "[ VALIDAR ]";
                console.error(err);
            }
        }

        function showFeedback(text, className) {
            const f = document.getElementById('feedback-area');
            f.innerText = text;
            f.className = className;
        }
    </script>
</body>
</html>
