<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAEEB - SEMANA DO CALOURO 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-arcade: radial-gradient(circle, #2c1a4d 0%, #110a1f 100%);
            --gabinete-borda-preta: #000000;
            --gabinete-corpo-laranja: #800000; /* Ajustado para o tom mais escuro da sua print */
            --gabinete-contorno-topo: #88aa00; /* Ajustado para o tom esverdeado da sua print */
            --text-pixel-white: #fff;
            --text-highlight-yellow: #ff0;
            --error-pixel: #ff4444;
            --success-pixel: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated; 
        }

        body {
            background: var(--bg-arcade);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-pixel-white);
            padding: 15px;
        }

        #logo-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            text-align: center;
        }

        #logo-img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); 
        }

        .arcade-card {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
        }

        .arcade-card-inner {
            background-color: var(--gabinete-corpo-laranja);
            border: 4px solid var(--gabinete-borda-preta);
            border-radius: 20px; 
            box-shadow: 
                inset 0 6px 0 var(--gabinete-contorno-topo), 
                inset 0 -6px 0 rgba(0,0,0,0.3),
                6px 6px 0 rgba(0,0,0,0.5); 
            width: 100%;
            padding: 25px 15px;
            text-align: center;
        }

        .arcade-card h2 {
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--text-pixel-white);
            text-shadow: 2px 2px 0px #000;
        }

        .arcade-card label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-pixel-white);
        }

        .arcade-input {
            width: 95%;
            background: #222;
            border: 3px solid #777;
            color: var(--text-pixel-white);
            padding: 12px;
            font-size: 10px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        .arcade-input:focus {
            border-color: #0000ff;
        }

        .arcade-btn {
            background-color: #0000ff;
            border: 3px solid #fff;
            color: #fff;
            padding: 12px 20px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.6);
            animation: piscar 2s infinite;
            width: 90%;
            margin-top: 10px;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; background-color: #1e90ff; }
        }

        .arcade-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.6);
        }

        #feedback-area {
            margin-top: 15px;
            width: 100%;
            display: none;
        }

        .feedback-inner {
            padding: 12px;
            font-size: 9px;
            line-height: 1.4;
            text-align: center;
            border: 3px solid transparent;
        }

        .feedback-error {
            background-color: #500;
            border-color: var(--error-pixel);
            color: var(--error-pixel);
        }

        .feedback-success {
            background-color: #040;
            border-color: var(--success-pixel);
            color: var(--success-pixel);
        }

        #fire-gif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px; 
            z-index: 100;
            pointer-events: none; 
        }

        /* MAGIA AQUI: Esconde o foguinho em celulares para não atrapalhar o clique */
        @media (max-width: 600px) {
            #fire-gif {
                display: none !important;
            }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="logo-container">
        <img src="./assets/logo-c3.png" id="logo-img" alt="CAEEB 2026">
    </div>

    <div class="arcade-card">
        <div class="arcade-card-inner">
            <h2 id="dia-titulo">DESAFIO DIA 1</h2>
            
            <label>ENTRE COM O SEU EMAIL</label>
            <input type="email" id="email" class="arcade-input" placeholder="aluno@ufpa.br">

            <div id="password-container" class="hidden">
                <label>SENHAS ANTERIORES</label>
                <input type="text" id="senhas" class="arcade-input" placeholder="DIGITE SEM ESPACOS">
            </div>

            <button type="button" onclick="handleSubmit()" id="btn-submit" class="arcade-btn">
                [ VALIDAR ]
            </button>

            <div id="feedback-area"></div>
        </div>
    </div>

    <img src="https://media.tenor.com/ygbw_OpxS_0AAAAi/fire-joypixels.gif" id="fire-gif" alt="Fogo">

    <script>
        // NÃO ESQUEÇA DE COLAR SUA URL DO WEB APP AQUI EMBAIXO:
        const API_URL = "https://script.google.com/macros/s/AKfycbznoIaESXG3b0lCfyw06Bpx0Y6sjsmo47jfCnV_gx3HQGvNVFERfoTZ6Rg73nErFbFdRg/exec"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        const d = urlParams.get('d') || 1;

        document.getElementById('dia-titulo').innerText = `DESAFIO DIA ${d}`;
        if (d >= 3) document.getElementById('password-container').classList.remove('hidden');

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const senhas = document.getElementById('senhas').value.trim();
            const btn = document.getElementById('btn-submit');

            // Feedback imediato se faltar URL ou E-mail
            if (!email || !q) {
                showFeedback("ERRO: E-MAIL OU PARAMETRO DA URL AUSENTE! (Você escaneou o QR Code?)", "feedback-error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            document.getElementById('feedback-area').style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ email, hash: q, senhas, diaAtual: d })
                });
                
                const textResult = await response.text();
                let result;
                try {
                    result = JSON.parse(textResult);
                } catch (parseError) {
                    throw new Error("Erro no servidor (verifique o Web App URL)");
                }

                if (result.type === "DANGER") {
                    showFeedback(result.message, "feedback-error");
                    btn.style.display = 'none'; // Some com o botão no game over
                } else if (result.success) {
                    showFeedback(result.message, "feedback-success");
                    btn.innerText = "SUCESSO!";
                    btn.style.backgroundColor = "var(--success-pixel)";
                    btn.style.animation = "none";
                } else {
                    showFeedback(result.message, "feedback-error");
                    btn.innerText = "[ TENTAR NOVAMENTE ]";
                    btn.disabled = false;
                }
            } catch (err) {
                showFeedback("ERRO DE CONEXAO COM O GOOGLE SCRIPT!", "feedback-error");
                btn.disabled = false;
                btn.innerText = "[ VALIDAR ]";
            }
        }

        // Função de feedback simplificada e robusta
        function showFeedback(text, className) {
            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.style.display = 'block';
            feedbackArea.innerHTML = `<div class="feedback-inner ${className}">${text}</div>`;
        }
    </script>
</body>
</html>
