<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAEEB - SEMANA DO CALOURO 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Fundo radial simulando tela CRT */
            --bg-arcade: radial-gradient(circle, #2c1a4d 0%, #110a1f 100%);
            
            /* Cores exatas do botão START de referência */
            --gabinete-borda-preta: #000000;
            --gabinete-corpo-laranja: #f98b1b;
            --gabinete-contorno-topo: #e4f91e;
            --gabinete-contorno-fundo: #f91ebd;
            
            --text-pixel-white: #fff;
            --text-pixel-black: #000;
            --text-highlight-yellow: #ff0;
            --error-pixel: #ff4444;
            --success-pixel: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            /* Força renderização pixelada para imagens, fontes e formas */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }

        body {
            background: var(--bg-arcade);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-pixel-white);
            overflow: hidden; 
            padding: 20px;
        }

        /* Área do Logo PNG da pasta assets */
        #logo-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            text-align: center;
        }

        #logo-img {
            max-width: 100%;
            height: auto;
            /* Efeito de brilho na logo */
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); 
        }

        /* O GABINETE PRINCIPAL (Contêiner externo) */
        .arcade-card {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* A DIV MAIN - REDESENHADA PARA SER IDENTICA AO BOTÃO START */
        .arcade-card-inner {
            background-color: var(--gabinete-corpo-laranja);
            border: 4px solid var(--gabinete-borda-preta);
            /* Arredondamento pixelado, ajustado para responsividade */
            border-radius: 25px; 
            
            /* Múltiplas sombras internas e externas para simular a forma e os contornos exatos da referência */
            box-shadow: 
                /* Contorno Topo Amarelo Vibrante */
                inset 0 8px 0 var(--gabinete-contorno-topo), 
                /* Contorno Fundo Rosa Vibrante */
                inset 0 -8px 0 var(--gabinete-contorno-fundo),
                /* Sombra Externa Pixelada para profundidade tridimensional */
                8px 8px 0 rgba(0,0,0,0.5); 
                
            width: 100%;
            padding: 30px;
            text-align: center;
            position: relative;
            transform: translate(0, 0);
            transition: transform 0.1s;
        }

        /* Título do Desafio - Centralizado dentro do botão */
        .arcade-card h2 {
            font-size: 16px;
            margin-bottom: 25px;
            color: var(--text-pixel-black);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
        }

        /* Labels pretos para contraste dentro da forma laranja */
        .arcade-card label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
            color: var(--text-pixel-black);
            font-weight: bold;
        }

        /* Inputs Pixelados - Mais simples e centralizados */
        .arcade-input {
            width: 90%;
            background: #fff;
            border: 4px solid var(--gabinete-borda-preta);
            color: var(--text-pixel-black);
            padding: 15px;
            font-size: 10px;
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
            outline: none;
            text-align: center;
        }

        .arcade-input:focus {
            border-color: #0000ff; /* Azul clássico no foco */
        }

        /* Botão de Validar - Centralizado, estilo Retro com Animação */
        .arcade-btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .arcade-btn {
            background-color: #0000ff; /* Azul clássico */
            border: 4px solid #fff;
            color: #fff;
            padding: 15px 30px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.2s;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.4);
            animation: piscar 2s infinite; /* Efeito Piscar "Insert Coin" */
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; background-color: #1e90ff; }
        }

        .arcade-btn:hover {
            background-color: #1e90ff;
            animation: none; /* Para de piscar ao passar o mouse */
        }

        .arcade-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.4);
        }

        .arcade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        /* Área de Feedback (Sucesso/Erro) - Centralizada */
        #feedback-area {
            margin-top: 25px;
            width: 100%;
            display: none;
            justify-content: center;
        }

        .feedback-inner {
            padding: 15px;
            border: 4px solid transparent;
            font-size: 8px;
            line-height: 1.6;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feedback-error {
            background-color: #400;
            border-color: var(--error-pixel);
            color: var(--error-pixel);
            display: flex !important;
            animation: tremerDramatico 0.5s;
        }

        /* Animação de Tremer mais visível e dramática */
        @keyframes tremerDramatico {
            0% { transform: translateX(0); }
            10% { transform: translateX(-10px); }
            20% { transform: translateX(10px); }
            30% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            60% { transform: translateX(10px); }
            70% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            90% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .feedback-success {
            background-color: #040;
            border-color: var(--success-pixel);
            color: var(--success-pixel);
            display: flex !important;
            animation: cair 0.4s ease-out;
        }

        @keyframes cair {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* O Gifu do Foguinho - Canto inferior direito */
        #fire-gif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px; 
            height: auto;
            z-index: 100;
            pointer-events: none; 
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="logo-container">
        <img src="./assets/logo-c3.png" id="logo-img" alt="CAEEB 2026">
    </div>

    <div class="arcade-card">
        <div class="arcade-card-inner">
            <h2 id="dia-titulo">DESAFIO DIA 1</h2>
            
            <label>E-mail Institucional</label>
            <input type="email" id="email" class="arcade-input" placeholder="aluno@ufpa.br">

            <div id="password-container" class="hidden">
                <label>Senhas Anteriores</label>
                <input type="text" id="senhas" class="arcade-input" placeholder="Digite sem espaços">
            </div>

            <div class="arcade-btn-container">
                <button onclick="handleSubmit()" id="btn-submit" class="arcade-btn">
                    [ VALIDAR ]
                </button>
            </div>

            <div id="feedback-area">
                <div id="feedback-content" class="feedback-inner"></div>
            </div>
        </div>
    </div>

    <img src="./assets/foguinho.gif" id="fire-gif" alt="Fogo">

    <script>
        // COLOQUE AQUI A URL DO SEU GOOGLE APPS SCRIPT
        const API_URL = "SUA_URL_DO_WEB_APP_AQUI"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        const d = urlParams.get('d') || 1;

        // Ajusta a interface dependendo do dia
        document.getElementById('dia-titulo').innerText = `DESAFIO DIA ${d}`;
        if (d >= 3) document.getElementById('password-container').classList.remove('hidden');

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const senhas = document.getElementById('senhas').value.trim();
            const btn = document.getElementById('btn-submit');
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackContent = document.getElementById('feedback-content');
            const arcadeCardInner = document.querySelector('.arcade-card-inner');

            if (!email || !q) {
                showFeedback("ERRO: E-MAIL OU QR CODE AUSENTE!", "feedback-error");
                return;
            }

            // Estado de carregamento
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            feedbackContent.className = "feedback-inner"; // Reset classes
            feedbackContent.innerHTML = "";
            feedbackArea.style.display = 'none'; // Esconde a área de feedback

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ email, hash: q, senhas, diaAtual: d })
                });
                
                // Melhoria de segurança no front-end: garantindo que o retorno é um JSON válido
                const textResult = await response.text();
                let result;
                try {
                    result = JSON.parse(textResult);
                } catch (parseError) {
                    throw new Error("Erro de CORS ou Script redirecionou a requisição.");
                }

                if (result.type === "DANGER") {
                    showFeedback(result.message, "feedback-error");
                    btn.remove(); // Game Over = Remove o botão
                } else if (result.success) {
                    showFeedback(result.message, "feedback-success");
                    btn.innerText = "SUCESSO!";
                    btn.style.backgroundColor = "var(--success-pixel)";
                    btn.style.animation = "none"; // Para de piscar
                } else {
                    showFeedback(result.message, "feedback-error");
                    btn.innerText = "[ TENTAR NOVAMENTE ]";
                    btn.disabled = false;
                }
            } catch (err) {
                showFeedback("ERRO DE COMUNICACAO COM O SERVIDOR!", "feedback-error");
                btn.disabled = false;
                btn.innerText = "[ VALIDAR ]";
                console.error(err);
            }
        }

        function showFeedback(text, className) {
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackContent = document.getElementById('feedback-content');
            feedbackArea.style.display = 'flex'; // Mostra a área de feedback
            feedbackContent.innerText = text;
            feedbackContent.className = `feedback-inner ${className}`;
        }
    </script>
</body>
</html>
